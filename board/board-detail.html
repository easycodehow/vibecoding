<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세 | 바이브코딩</title>
    <link href="../font/Galmuri-v2.40.3/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/board.css">
</head>
<body>
    <header class="header-solid">
        <nav class="navbar">
            <a href="../index.html" class="logo">VIBECODING</a>
            <div class="nav-right">
                <ul class="nav-menu">
                    <li><a href="../index.html#intro">소개</a></li>
                    <li><a href="../index.html#feature">특징</a></li>
                    <li><a href="../index.html#effect">기대효과</a></li>
                    <li><a href="../index.html#limitation">한계점</a></li>
                    <li><a href="board.html" class="active">커뮤니티</a></li>
                </ul>
                <div class="nav-auth" id="nav-auth">
                    <a href="../login.html" class="nav-auth-link nav-auth-icon" title="로그인" aria-label="로그인">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </a>
                    <a href="../signup.html" class="nav-auth-link nav-auth-icon" title="회원가입" aria-label="회원가입">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="board-main">
        <div class="board-container">
            <article class="post-detail" id="post-detail">
                <header class="post-detail-header">
                    <h3 class="post-title" id="post-title"></h3>
                    <div class="post-meta">
                        <span class="post-author" id="post-author"></span>
                        <span class="post-date" id="post-date"></span>
                        <span class="post-views" id="post-views"></span>
                    </div>
                </header>

                <div class="post-image" id="post-image-wrap" hidden>
                    <img src="" alt="첨부 이미지" id="post-image-el">
                </div>

                <div class="post-content" id="post-content"></div>

                <div class="post-actions" id="post-actions">
                    <a href="#" class="btn btn-secondary" id="edit-link" hidden>수정</a>
                    <button type="button" class="btn btn-danger" id="delete-btn" hidden>삭제</button>
                    <a href="board.html" class="btn btn-outline">목록으로</a>
                </div>
            </article>

            <section class="comment-section">
                <h3>댓글 <span class="comment-count" id="comment-count">0</span></h3>

                <ul class="comment-list" id="comment-list"></ul>

                <form class="comment-form" id="comment-form">
                    <textarea rows="3" placeholder="댓글을 입력하세요" id="comment-input"></textarea>
                    <button type="submit" class="btn btn-primary">댓글 등록</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <a href="../index.html" class="footer-logo">VIBECODING</a>
            <p class="footer-copyright">&copy; 2026 EASYCODE. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
