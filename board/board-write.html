<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 | 바이브코딩</title>
    <link href="../font/Galmuri-v2.40.3/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/board.css">
</head>
<body>
    <header class="header-solid">
        <nav class="navbar">
            <a href="../index.html" class="logo">VIBECODING</a>
            <div class="nav-right">
                <ul class="nav-menu">
                    <li><a href="../index.html#intro">소개</a></li>
                    <li><a href="../index.html#feature">특징</a></li>
                    <li><a href="../index.html#effect">기대효과</a></li>
                    <li><a href="../index.html#limitation">한계점</a></li>
                    <li><a href="board.html" class="active">커뮤니티</a></li>
                </ul>
                <div class="nav-auth" id="nav-auth">
                    <a href="../login.html" class="nav-auth-link">로그인</a>
                    <a href="../signup.html" class="nav-auth-link">회원가입</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="board-main">
        <!-- board-write.html?id=123 형태로 접근 시 수정 모드로 사용 (레이아웃만, 분기 로직은 이후 단계) -->
        <div class="board-container board-form-container">
            <h2>글쓰기</h2>

            <form class="post-form">
                <div class="form-group">
                    <label for="post-title">제목</label>
                    <input type="text" id="post-title" placeholder="제목을 입력하세요">
                </div>

                <div class="form-group">
                    <label for="post-content">내용</label>
                    <textarea id="post-content" rows="12" placeholder="내용을 입력하세요"></textarea>
                </div>

                <div class="form-group">
                    <label for="post-image">이미지 첨부 (선택, 1개만 가능)</label>
                    <input type="file" id="post-image" accept="image/*">
                    <div class="image-preview">
                        <img src="../img/hero.jpg" alt="이미지 미리보기" class="preview-img">
                        <button type="button" class="btn btn-outline">이미지 삭제</button>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="board.html" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">등록</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <a href="../index.html" class="footer-logo">VIBECODING</a>
            <p class="footer-copyright">&copy; 2026 EASYCODE. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
